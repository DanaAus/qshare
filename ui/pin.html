<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagShare - Secure Access</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --error: #ff5555;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background-color: var(--surface);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 120px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #9c68db;
        }

        .error-msg {
            color: var(--error);
            margin-top: 15px;
            font-size: 14px;
            display: {{if .Error}}block{{else}}none{{end}};
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Secure Access</h1>
        <p>This file is protected. Please enter the 4-digit PIN to download.</p>

        <form method="GET">
            <div class="input-group">
                <input type="text" name="pin" maxlength="4" placeholder="0000" required autofocus>
            </div>
            <button type="submit" class="btn">Unlock & Download</button>
        </form>

        <div class="error-msg">
            {{if .Error}}{{.Error}}{{end}}
        </div>
    </div>
</body>

</html>
